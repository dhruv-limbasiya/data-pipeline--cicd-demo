name: CI - Data Pipeline

on:
  push:
    branches: [master, develop]
    paths:
      - 'lambda_etl_customer/**'
      - 'tests/**'
      - '.github/workflows/**'
      - 'requirements-dev.txt'
      - 'buildspec.yml'
  pull_request:
    branches: [master, develop]

jobs:
  lint-and-test:
    name: Lint and Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: PEP8 lint (flake8)
        run: flake8 lambda tests --max-line-length=100 --exclude=__pycache__

      - name: Unit tests (pytest)
        run: pytest tests/ -v

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify AWS Connection
        run: aws sts get-caller-identity

      - name: Package Lambda
        run: |
          cd lambda/etl_customer
          zip -r lambda.zip .

      - name: Deploy Lambda
        run: |
          aws lambda update-function-code \
          --function-name customer-transform \
          --zip-file fileb://lambda/etl_customer/lambda.zip